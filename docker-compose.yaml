version: "3.9"

services:
  # ── SuperZ Runtime (orchestrator) ─────────────────────────────────
  superz-runtime:
    build: .
    container_name: superz-runtime
    restart: unless-stopped
    ports:
      - "8443:8443"   # keeper
      - "8444:8444"   # git-agent
      - "7777:7777"   # mud (optional)
      - "8501-8512:8501-8512"  # fleet agents
    volumes:
      - superz-data:/home/superz/.superinstance
    environment:
      - SUPERZ_HEADLESS=true
    command: ["python", "-m", "superz_runtime", "--headless"]

  # ── Keeper (optional — separate container) ────────────────────────
  # keeper:
  #   build:
  #     context: ./agents/keeper-agent
  #     dockerfile: Dockerfile
  #   container_name: keeper-agent
  #   ports:
  #     - "8443:8443"
  #   volumes:
  #     - superz-data:/data/keeper

  # ── Holodeck / MUD (optional) ────────────────────────────────────
  # holodeck:
  #   build:
  #     context: ./holodeck-studio
  #     dockerfile: Dockerfile
  #   container_name: holodeck-mud
  #   ports:
  #     - "7777:7777"
  #   environment:
  #     - MUD_PORT=7777

volumes:
  superz-data:
    driver: local
